<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi TTE</title>
    <meta name="description" content="Halaman verifikasi Tanda Tangan Elektronik berbasis QR Code.">
    <link rel="icon" type="image/png" href="./favicon.png">
    <!-- Open Graph / Social Preview -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Verifikasi TTE — Tanda Tangan Elektronik">
    <meta property="og:description" content="Verifikasi keaslian Tanda Tangan Elektronik berbasis QR Code.">
    <meta property="og:image" content="https://qr-tte-generator.vercel.app/favicon.png">
    <meta property="og:url" content="https://qr-tte-generator.vercel.app/verifikasi.html">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Verifikasi TTE — Tanda Tangan Elektronik">
    <meta name="twitter:description" content="Verifikasi keaslian Tanda Tangan Elektronik berbasis QR Code.">
    <meta name="twitter:image" content="https://qr-tte-generator.vercel.app/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== LOADING STATE ===== */
        .loading-wrap {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            gap: 16px;
        }

        .loading-wrap.hide {
            display: none;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, .2);
            border-top-color: #818cf8;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-wrap p {
            font-size: 13px;
            color: #94a3b8;
        }

        /* ===== ZOOM-OUT TTD OVERLAY ===== */
        .ttd-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            animation: overlayFade 3.5s ease-in-out forwards;
        }

        .ttd-overlay.hide {
            display: none;
        }

        .ttd-overlay img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            animation: zoomOut 3s cubic-bezier(.22, .61, .36, 1) forwards;
            filter: drop-shadow(0 0 60px rgba(99, 102, 241, .3));
        }

        @keyframes zoomOut {
            0% {
                transform: scale(3.5);
                opacity: 0;
            }

            12% {
                opacity: 1;
            }

            55% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes overlayFade {

            0%,
            75% {
                opacity: 1;
                pointer-events: all;
            }

            100% {
                opacity: 0;
                pointer-events: none;
            }
        }

        .ttd-overlay .verified-flash {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #34d399;
            opacity: 0;
            animation: flashIn 3.5s ease forwards;
        }

        @keyframes flashIn {

            0%,
            35% {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }

            50% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            100% {
                opacity: 0;
            }
        }

        /* ===== MAIN CONTENT ===== */
        .main-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            animation: contentIn .8s ease-out 3.2s forwards;
        }

        .main-wrap.instant {
            opacity: 1;
            animation: none;
        }

        @keyframes contentIn {
            to {
                opacity: 1;
            }
        }

        .card {
            background: rgba(255, 255, 255, .05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 99px;
            margin-bottom: 20px;
        }

        .badge.valid {
            background: rgba(16, 185, 129, .12);
            border: 1px solid rgba(16, 185, 129, .25);
            color: #34d399;
        }

        .badge.invalid {
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .25);
            color: #f87171;
        }

        .status-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .status-icon.valid {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 0 30px rgba(16, 185, 129, .3);
        }

        .status-icon.invalid {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 0 30px rgba(239, 68, 68, .3);
        }

        .status-icon svg {
            width: 28px;
            height: 28px;
            stroke: #fff;
            fill: none;
            stroke-width: 3;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sub {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        /* TTD inside card */
        .ttd-card {
            background: rgba(255, 255, 255, .95);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .15);
        }

        .ttd-card img {
            max-width: 100%;
            max-height: 160px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .ttd-card .ttd-label {
            font-size: 10px;
            color: #64748b;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info {
            text-align: left;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 12px;
            padding: 16px;
            font-size: 13px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
        }

        .row:last-child {
            border: none;
        }

        .label {
            color: #64748b;
            font-weight: 500;
        }

        .value {
            color: #e2e8f0;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }

        .footer-text {
            margin-top: 24px;
            font-size: 11px;
            color: #475569;
        }

        .uuid-box {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            font-family: monospace;
            color: #64748b;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <!-- LOADING -->
    <div class="loading-wrap" id="loadingWrap">
        <div class="loader"></div>
        <p>Memverifikasi Tanda Tangan Elektronik...</p>
    </div>

    <!-- TTD ZOOM-OUT OVERLAY (populated by JS) -->
    <div class="ttd-overlay hide" id="ttdOverlay">
        <img id="overlayImg" src="" alt="Tanda Tangan">
        <div class="verified-flash">✓ Tanda Tangan Terverifikasi</div>
    </div>

    <!-- MAIN CONTENT (populated by JS) -->
    <div class="main-wrap instant" id="mainWrap">
        <div class="card" id="cardContent">
            <!-- JS will populate this -->
        </div>
    </div>

    <script>
        (async () => {
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbwZNiQtyBHqqXMOINVkXYzQhxggZKiwc_WkqzUhWJ5sSrHbCoqLimR6Q22hFSMkBySd/exec';

            const params = new URLSearchParams(window.location.search);
            const uuid = params.get('id');

            const loadingWrap = document.getElementById('loadingWrap');
            const ttdOverlay = document.getElementById('ttdOverlay');
            const overlayImg = document.getElementById('overlayImg');
            const mainWrap = document.getElementById('mainWrap');
            const cardContent = document.getElementById('cardContent');

            // No UUID provided
            if (!uuid) {
                loadingWrap.classList.add('hide');
                cardContent.innerHTML = `
                <h1>🔐 QR TTE Verifier</h1>
                <p class="sub" style="margin-top:12px">Scan QR Code TTE untuk memverifikasi keaslian tanda tangan elektronik.</p>
            `;
                return;
            }

            // Fetch data from GAS
            try {
                const res = await fetch(`${GAS_URL}?id=${encodeURIComponent(uuid)}`);
                const data = await res.json();

                loadingWrap.classList.add('hide');

                if (data.status === 'found') {
                    const d = data.data;
                    const hasTTD = d.ttdBase64 && d.ttdBase64.length > 10;

                    // === ZOOM-OUT ANIMATION ===
                    if (hasTTD) {
                        overlayImg.src = d.ttdBase64;
                        ttdOverlay.classList.remove('hide');
                        mainWrap.classList.remove('instant');
                        mainWrap.style.opacity = '0';
                        mainWrap.style.animation = 'contentIn .8s ease-out 3.2s forwards';
                        // Remove overlay after animation
                        setTimeout(() => { ttdOverlay.remove(); }, 4000);
                    }

                    // === BUILD CARD ===
                    cardContent.innerHTML = `
                    <div class="badge valid">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        TERVERIFIKASI
                    </div>
                    <div class="status-icon valid"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
                    <h1>TTE VALID</h1>
                    <p class="sub">Tanda Tangan Elektronik ini sah dan tercatat dalam sistem.</p>
                    ${hasTTD ? `
                    <div class="ttd-card">
                        <img src="${d.ttdBase64}" alt="Tanda Tangan ${esc(d.nama)}">
                        <div class="ttd-label">Tanda Tangan — ${esc(d.nama)}</div>
                    </div>` : ''}
                    <div class="info">
                        <div class="row"><span class="label">Nama</span><span class="value">${esc(d.nama)}</span></div>
                        <div class="row"><span class="label">Jabatan</span><span class="value">${esc(d.jabatan)}</span></div>
                        <div class="row"><span class="label">NIP</span><span class="value">${esc(d.nip)}</span></div>
                        <div class="row"><span class="label">UUID</span><span class="value" style="font-size:11px;font-family:monospace">${esc(d.uuid)}</span></div>
                        <div class="row"><span class="label">Timestamp</span><span class="value">${esc(d.timestamp)}</span></div>
                    </div>
                    <p class="footer-text">© 2026 Digitalized by WiraWebSolusi</p>
                `;
                } else {
                    // NOT FOUND
                    cardContent.innerHTML = `
                    <div class="badge invalid">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        TIDAK DITEMUKAN
                    </div>
                    <div class="status-icon invalid"><svg viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></div>
                    <h1>DATA TIDAK DITEMUKAN</h1>
                    <p class="sub">TTE dengan ID berikut tidak tercatat dalam sistem.</p>
                    <div class="uuid-box">${esc(uuid)}</div>
                    <p class="footer-text">© 2026 Digitalized by WiraWebSolusi</p>
                `;
                }

            } catch (err) {
                loadingWrap.classList.add('hide');
                cardContent.innerHTML = `
                <div class="badge invalid">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    ERROR
                </div>
                <div class="status-icon invalid"><svg viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></div>
                <h1>GAGAL MEMVERIFIKASI</h1>
                <p class="sub">Terjadi kesalahan saat menghubungi server. Silakan coba lagi.</p>
                <p class="footer-text">© 2026 Digitalized by WiraWebSolusi</p>
            `;
            }
        })();

        function esc(text) {
            if (!text) return '';
            const el = document.createElement('span');
            el.textContent = String(text);
            return el.innerHTML;
        }
    </script>
</body>

</html>
