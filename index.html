<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR TTE Generator — Tanda Tangan Elektronik</title>
    <meta name="description" content="Generator Tanda Tangan Elektronik berbasis QR Code dengan verifikasi online.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.6.0/dist/easy.qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glow {
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp .6s ease-out forwards;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            animation: spin .8s linear infinite;
        }

        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }

        #qrcode canvas,
        #qrcode img {
            border-radius: 12px;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-brand-900 text-white">

    <!-- Header -->
    <header class="pt-8 pb-4 text-center fade-up">
        <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-300 text-xs font-medium mb-4">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            Verified Digital Signature
        </div>
        <h1
            class="text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-brand-200 to-brand-400 bg-clip-text text-transparent">
            QR TTE Generator</h1>
        <p class="mt-2 text-slate-400 text-sm max-w-md mx-auto">Buat Tanda Tangan Elektronik berbasis QR Code yang
            terverifikasi secara online.</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 pb-16 grid md:grid-cols-2 gap-8 items-start">

        <!-- Form Card -->
        <section class="glass rounded-2xl p-6 md:p-8 glow fade-up" style="animation-delay:.1s">
            <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                <span class="w-8 h-8 rounded-lg bg-brand-500/20 flex items-center justify-center text-brand-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </span>
                Data Pemilik TTE
            </h2>
            <form id="tteForm" class="space-y-5" autocomplete="off">
                <!-- Nama -->
                <div>
                    <label for="nama" class="block text-xs font-medium text-slate-400 mb-1.5">Nama Lengkap <span class="text-red-400">*</span></label>
                    <input id="nama" type="text" required placeholder="WIRAWAN, S.Kom"
                        class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none input-glow transition">
                </div>
                <!-- Jabatan -->
                <div>
                    <label for="jabatan" class="block text-xs font-medium text-slate-400 mb-1.5">Jabatan <span class="text-red-400">*</span></label>
                    <input id="jabatan" type="text" required placeholder="Penata Layanan Operasional"
                        class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none input-glow transition">
                </div>
                <!-- NIP -->
                <div>
                    <label for="nip" class="block text-xs font-medium text-slate-400 mb-1.5">NIP <span class="text-red-400">*</span></label>
                    <input id="nip" type="text" required placeholder="Silahkan input NIP disini"
                        class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3 text-sm text-white placeholder-slate-500 outline-none input-glow transition">
                </div>
                <!-- Logo Upload -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Logo Instansi (Opsional)</label>
                    <label for="logoUpload"
                        class="flex items-center gap-3 cursor-pointer w-full rounded-xl bg-white/5 border border-dashed border-white/15 px-4 py-3 text-sm text-slate-400 hover:border-brand-400/50 hover:bg-brand-500/5 transition">
                        <svg class="w-5 h-5 shrink-0 text-brand-400" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <span id="logoLabel">Klik untuk upload logo PNG/JPG</span>
                    </label>
                    <input id="logoUpload" type="file" accept="image/*" class="hidden">
                </div>
                <!-- TTD Upload -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5">Tanda Tangan Asli <span
                            class="text-red-400">*</span></label>
                    <label for="ttdUpload"
                        class="flex items-center gap-3 cursor-pointer w-full rounded-xl bg-white/5 border border-dashed border-white/15 px-4 py-3 text-sm text-slate-400 hover:border-emerald-400/50 hover:bg-emerald-500/5 transition">
                        <svg class="w-5 h-5 shrink-0 text-emerald-400" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path
                                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                        <span id="ttdLabel">Upload gambar tanda tangan PNG/JPG</span>
                    </label>
                    <input id="ttdUpload" type="file" accept="image/*" class="hidden">
                    <div id="ttdPreviewWrap" class="hidden mt-2 p-3 rounded-xl bg-white/5 border border-white/10">
                        <p class="text-[10px] text-slate-500 mb-1.5">Preview TTD:</p>
                        <img id="ttdPreview" class="max-h-20 mx-auto" alt="Preview TTD">
                    </div>
                </div>

                <!-- Buttons -->
                <div class="pt-2 space-y-3">
                    <button type="submit" id="btnGenerate"
                        class="w-full py-3 rounded-xl bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-semibold text-sm transition-all shadow-lg shadow-brand-500/20 active:scale-[.98]">
                        ⚡ Generate QR Code
                    </button>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="btnDownload" disabled
                            class="py-2.5 rounded-xl bg-white/5 border border-white/10 text-slate-400 text-sm font-medium hover:bg-white/10 transition disabled:opacity-30 disabled:cursor-not-allowed">
                            📥 Download PNG
                        </button>
                        <button type="button" id="btnSync" disabled
                            class="py-2.5 rounded-xl bg-white/5 border border-white/10 text-slate-400 text-sm font-medium hover:bg-white/10 transition disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                            <span id="syncSpinner" class="hidden">
                                <svg class="w-4 h-4 spinner" fill="none" stroke="currentColor" stroke-width="2"
                                    viewBox="0 0 24 24">
                                    <path
                                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                            </span>
                            <span id="syncText">☁️ Sync to Sheets</span>
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <!-- Preview Card -->
        <section class="glass rounded-2xl p-6 md:p-8 glow fade-up flex flex-col items-center"
            style="animation-delay:.25s">
            <h2 class="text-lg font-semibold mb-6 flex items-center gap-2 self-start">
                <span class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center text-emerald-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path
                            d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                    </svg>
                </span>
                Live Preview
            </h2>
            <!-- QR Placeholder -->
            <div id="qrPlaceholder"
                class="w-64 h-64 rounded-2xl bg-white/5 border-2 border-dashed border-white/10 flex flex-col items-center justify-center text-slate-500 text-sm gap-2">
                <svg class="w-12 h-12 opacity-30" fill="none" stroke="currentColor" stroke-width="1"
                    viewBox="0 0 24 24">
                    <path
                        d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
                QR Code akan muncul di sini
            </div>
            <div id="qrcode" class="hidden"></div>

            <!-- Info Card -->
            <div id="infoCard"
                class="hidden mt-6 w-full rounded-xl bg-white/5 border border-white/10 p-4 text-xs space-y-1.5">
                <div class="flex justify-between"><span class="text-slate-500">UUID</span><span id="infoUUID"
                        class="text-brand-300 font-mono truncate max-w-[180px]">—</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Nama</span><span id="infoNama"
                        class="text-white">—</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Jabatan</span><span id="infoJabatan"
                        class="text-white">—</span></div>
                <div class="flex justify-between"><span class="text-slate-500">NIP</span><span id="infoNIP"
                        class="text-white font-mono">—</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Timestamp</span><span id="infoTime"
                        class="text-slate-300">—</span></div>
            </div>

            <!-- Sync Status -->
            <div id="syncStatus" class="hidden mt-4 w-full text-center text-xs py-2 rounded-lg"></div>
        </section>
    </main>

    <footer class="text-center text-xs text-slate-600 pb-8">
        © 2026 Digitalized by <a href="http://about-wrwn.ct.ws/?i=1" target="_blank" rel="noopener noreferrer"
            class="text-brand-400 hover:text-brand-300 underline underline-offset-2 font-semibold transition">WiraWebSolusi</a>
    </footer>

    <script>
            (() => {
                // ========== CONFIG ==========
                // Ganti URL ini dengan URL Web App Google Apps Script Anda setelah deploy
                const GAS_URL = 'https://script.google.com/macros/s/AKfycbwZNiQtyBHqqXMOINVkXYzQhxggZKiwc_WkqzUhWJ5sSrHbCoqLimR6Q22hFSMkBySd/exec';

                // ========== STATE ==========
                let currentUUID = '';
                let currentTimestamp = '';
                let logoDataURL = null;
                let ttdDataURL = null;
                let qrInstance = null;

                // ========== DOM ==========
                const form = document.getElementById('tteForm');
                const nama = document.getElementById('nama');
                const jabatan = document.getElementById('jabatan');
                const nip = document.getElementById('nip');
                const logoUpload = document.getElementById('logoUpload');
                const logoLabel = document.getElementById('logoLabel');
                const ttdUpload = document.getElementById('ttdUpload');
                const ttdLabel = document.getElementById('ttdLabel');
                const ttdPreview = document.getElementById('ttdPreview');
                const ttdPreviewWrap = document.getElementById('ttdPreviewWrap');
                const btnGenerate = document.getElementById('btnGenerate');
                const btnDownload = document.getElementById('btnDownload');
                const btnSync = document.getElementById('btnSync');
                const syncSpinner = document.getElementById('syncSpinner');
                const syncText = document.getElementById('syncText');
                const qrPlaceholder = document.getElementById('qrPlaceholder');
                const qrContainer = document.getElementById('qrcode');
                const infoCard = document.getElementById('infoCard');
                const syncStatus = document.getElementById('syncStatus');

                // ========== LOGO PREVIEW ==========
                logoUpload.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    logoLabel.textContent = file.name;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        logoDataURL = ev.target.result;
                        // Auto regenerate if QR already exists
                        if (currentUUID) generateQR();
                    };
                    reader.readAsDataURL(file);
                });

                // ========== TTD PREVIEW ==========
                ttdUpload.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    ttdLabel.textContent = file.name;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        ttdDataURL = ev.target.result;
                        ttdPreview.src = ttdDataURL;
                        ttdPreviewWrap.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                });

                // ========== UUID ==========
                function generateUUID() {
                    if (crypto.randomUUID) return crypto.randomUUID();
                    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                        const r = Math.random() * 16 | 0;
                        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
                    });
                }

                // ========== QR GENERATION ==========
                function generateQR() {
                    // QR mengarah ke halaman verifikasi.html (hosted di domain yang sama)
                    const baseURL = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');
                    const verifyURL = `${baseURL}/verifikasi.html?id=${currentUUID}`;

                    // Clear previous
                    qrContainer.innerHTML = '';
                    qrPlaceholder.classList.add('hidden');
                    qrContainer.classList.remove('hidden');

                    const opts = {
                        text: verifyURL,
                        width: 256,
                        height: 256,
                        colorDark: '#1e1b4b',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H,
                        quietZone: 12,
                        quietZoneColor: '#ffffff',
                        dotScale: 0.85,
                    };

                    if (logoDataURL) {
                        opts.logo = logoDataURL;
                        opts.logoWidth = 60;
                        opts.logoHeight = 60;
                        opts.logoBackgroundTransparent = false;
                        opts.logoBackgroundColor = '#ffffff';
                        opts.logoBorderRadius = 8;
                    }

                    qrInstance = new QRCode(qrContainer, opts);
                }

                // ========== FORM SUBMIT ==========
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    if (!nama.value.trim() || !jabatan.value.trim() || !nip.value.trim()) return;
                    if (!ttdDataURL) { alert('Harap upload gambar tanda tangan terlebih dahulu.'); return; }

                    currentUUID = generateUUID();
                    currentTimestamp = new Date().toLocaleString('id-ID', { dateStyle: 'long', timeStyle: 'medium' });

                    generateQR();

                    // Update info card
                    document.getElementById('infoUUID').textContent = currentUUID;
                    document.getElementById('infoNama').textContent = nama.value.trim();
                    document.getElementById('infoJabatan').textContent = jabatan.value.trim();
                    document.getElementById('infoNIP').textContent = nip.value.trim();
                    document.getElementById('infoTime').textContent = currentTimestamp;
                    infoCard.classList.remove('hidden');

                    // Enable buttons
                    btnDownload.disabled = false;
                    btnSync.disabled = false;
                    syncStatus.classList.add('hidden');
                });

                // ========== DOWNLOAD ==========
                btnDownload.addEventListener('click', () => {
                    const canvas = qrContainer.querySelector('canvas');
                    if (!canvas) {
                        const img = qrContainer.querySelector('img');
                        if (img) {
                            const a = document.createElement('a');
                            a.href = img.src;
                            a.download = `TTE_${nip.value.trim()}_${currentUUID.slice(0, 8)}.png`;
                            a.click();
                        }
                        return;
                    }
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `TTE_${nip.value.trim()}_${currentUUID.slice(0, 8)}.png`;
                    a.click();
                });

                // ========== SYNC TO SHEETS ==========
                btnSync.addEventListener('click', async () => {
                    if (!currentUUID) return;
                    // Loading state
                    btnSync.disabled = true;
                    syncSpinner.classList.remove('hidden');
                    syncText.textContent = 'Mengirim...';
                    syncStatus.classList.add('hidden');

                    const payload = {
                        nama: nama.value.trim(),
                        jabatan: jabatan.value.trim(),
                        nip: nip.value.trim(),
                        uuid: currentUUID,
                        timestamp: currentTimestamp,
                        ttdBase64: ttdDataURL
                    };

                    try {
                        const res = await fetch(GAS_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(payload)
                        });
                        const data = await res.json();
                        showSyncStatus(true, data.message || 'Data berhasil disimpan ke Google Sheets!');
                    } catch (err) {
                        showSyncStatus(false, 'Gagal mengirim data. Periksa koneksi & URL GAS.');
                    } finally {
                        btnSync.disabled = false;
                        syncSpinner.classList.add('hidden');
                        syncText.textContent = '☁️ Sync to Sheets';
                    }
                });

                function showSyncStatus(success, msg) {
                    syncStatus.classList.remove('hidden');
                    syncStatus.className = `mt-4 w-full text-center text-xs py-2.5 rounded-lg font-medium ${success
                        ? 'bg-emerald-500/10 border border-emerald-500/20 text-emerald-400'
                        : 'bg-red-500/10 border border-red-500/20 text-red-400'
                        }`;
                    syncStatus.textContent = msg;
                }
            })();
    </script>
</body>

</html>
